# Optional Node API host (Stripe checkout + Nano Banana)
# milanhype.com currently deploys the Next static export to GitHub Pages.
# Use this service when you want live /api/* endpoints.

services:
  - type: web
    name: milan-hype-api
    runtime: node
    rootDir: website
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/config
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BASE_URL
        value: https://milanhype.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NANO_BANANA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: META_PIXEL_ID
        sync: false
      - key: META_CAPI_ACCESS_TOKEN
        sync: false
