services:
  - type: web
    name: milan-hype-corefit
    runtime: node
    rootDir: website
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BASE_URL
        value: https://milanhype.com
      - key: NEXT_PUBLIC_BASE_URL
        value: https://milanhype.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NANO_BANANA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NANO_BANANA_MODEL
        sync: false
      - key: META_PIXEL_ID
        sync: false
      - key: META_CAPI_ACCESS_TOKEN
        sync: false
