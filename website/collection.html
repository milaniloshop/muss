<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection | Milan Hype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="collection">

  <div class="announcement">Free shipping on orders over $75 · Easy 30-day returns</div>

  <header class="site-header">
    <div class="container header-inner">
      <button class="menu-toggle" aria-label="Menu">☰</button>
      <a href="index.html" class="logo">Milan Hype</a>
      <nav class="nav-desktop">
        <a href="collection.html?c=new-arrivals">New Arrivals</a>
        <a href="collection.html?c=women">Women</a>
        <a href="collection.html?c=men">Men</a>
        <a href="collection.html?c=best-sellers">Best Sellers</a>
        <a href="collection.html?c=sale">Sale</a>
      </nav>
      <div class="header-actions">
        <button type="button" class="icon-btn cart-open">Bag (<span class="cart-count">0</span>)</button>
      </div>
    </div>
    <nav class="nav-mobile">
      <a href="collection.html?c=new-arrivals">New Arrivals</a>
      <a href="collection.html?c=women">Women</a>
      <a href="collection.html?c=men">Men</a>
      <a href="collection.html?c=best-sellers">Best Sellers</a>
      <a href="collection.html?c=sale">Sale</a>
    </nav>
  </header>

  <div class="collection-banner">
    <div class="container">
      <h1 id="collection-title">Collection</h1>
      <p id="collection-subtitle" style="color:var(--gold);font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;margin:0.5rem 0;"></p>
      <p id="collection-desc" style="color:var(--gray);max-width:560px;margin:1rem auto 0;"></p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="product-grid" id="collection-grid"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-bottom">© 2026 Milan Hype · <a href="index.html" style="color:inherit;">Home</a></div>
  </footer>

  <div class="cart-overlay"></div>
  <aside class="cart-drawer">
    <div class="cart-header"><h3>Your Bag</h3><button type="button" class="cart-close">✕</button></div>
    <div class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Subtotal</span><span class="cart-total-amount">$0.00</span></div>
      <button type="button" class="btn btn-primary btn-block">Checkout</button>
      <p class="shipping-note cart-shipping-note">Free shipping on orders over $75</p>
    </div>
  </aside>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
