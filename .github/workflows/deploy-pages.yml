name: Deploy Milan Hype to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install & build static export
        working-directory: website
        run: |
          npm ci
          node scripts/write-legacy-redirects.mjs
          npm run build

      - name: Build Sugar Nail Bar (subpath /sugar)
        working-directory: sugar-nail-bar
        env:
          PAGES_BASE_PATH: /sugar
        run: |
          npm ci
          npm run build
          mkdir -p ../website/out/sugar
          cp -r out/. ../website/out/sugar/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
